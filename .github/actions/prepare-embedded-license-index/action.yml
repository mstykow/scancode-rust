name: Prepare embedded license index
description: Regenerate, verify, and upload the embedded license index artifact
inputs:
  artifact-name:
    description: Workflow artifact name for the generated embedded license index
    required: false
    default: embedded-license-index
  artifact-path:
    description: Path to the embedded license index in the repository
    required: false
    default: resources/license_detection/license_index.zst
  retention-days:
    description: Artifact retention in days
    required: false
    default: "1"
runs:
  using: composite
  steps:
    - name: Regenerate embedded license index
      shell: bash
      run: cargo run --locked --manifest-path xtask/Cargo.toml --bin generate-index-artifact -- --output "${{ inputs.artifact-path }}"

    - name: Verify generated index artifact
      shell: bash
      run: |
        set -euo pipefail
        artifact="${{ inputs.artifact-path }}"

        if [[ ! -f "$artifact" ]]; then
          echo "Embedded license index was not generated at $artifact"
          exit 1
        fi

        if grep -q '^version https://git-lfs.github.com/spec/v1$' "$artifact"; then
          echo "Embedded license index generation produced a Git LFS pointer instead of artifact contents"
          exit 1
        fi

        actual_oid=$(sha256sum "$artifact" | awk '{print $1}')
        actual_size=$(wc -c < "$artifact" | tr -d '[:space:]')

        if [[ "$actual_size" == "0" ]]; then
          echo "Embedded license index generation produced an empty artifact"
          exit 1
        fi

        echo "Generated embedded license index sha256: $actual_oid"
        echo "Generated embedded license index size: $actual_size"

    - name: Upload embedded license index
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.artifact-path }}
        if-no-files-found: error
        retention-days: ${{ inputs.retention-days }}
