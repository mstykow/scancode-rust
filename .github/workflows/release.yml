name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  license-index:
    name: Verify Embedded License Index
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          submodules: recursive
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          key: embedded-license-index

      - name: Verify embedded license index
        uses: ./.github/actions/verify-embedded-license-index

  build:
    name: Build ${{ matrix.target }}
    needs: license-index
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            archive_format: tar.gz
            packages: pkg-config libsqlite3-dev

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive_format: tar.gz
            packages: pkg-config libsqlite3-dev

          # x86_64-apple-darwin removed: macos-15-large requires paid plan
          # Intel Mac users can use Rosetta 2 to run ARM builds

          - target: aarch64-apple-darwin
            os: macos-latest
            archive_format: tar.gz
            packages: ""

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_format: zip
            ext: .exe
            packages: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          lfs: false

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606
        with:
          cache: false
          rustflags: ""
          target: ${{ matrix.target }}

      - name: Install system packages
        if: matrix.packages != ''
        run: sudo apt-get update && sudo apt-get install --assume-yes ${{ matrix.packages }}

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create archive (Unix)
        if: matrix.archive_format == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf provenant-${{ matrix.target }}.tar.gz provenant${{ matrix.ext }}
          if command -v sha256sum > /dev/null; then
            sha256sum provenant-${{ matrix.target }}.tar.gz > provenant-${{ matrix.target }}.tar.gz.sha256
          else
            shasum -a 256 provenant-${{ matrix.target }}.tar.gz > provenant-${{ matrix.target }}.tar.gz.sha256
          fi
        shell: bash

      - name: Create archive (Windows)
        if: matrix.archive_format == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a provenant-${{ matrix.target }}.zip provenant${{ matrix.ext }}
          $hash = (Get-FileHash "provenant-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  provenant-${{ matrix.target }}.zip" | Out-File -FilePath "provenant-${{ matrix.target }}.zip.sha256" -Encoding ascii
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: provenant-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/provenant-${{ matrix.target }}.${{ matrix.archive_format }}
            target/${{ matrix.target }}/release/provenant-${{ matrix.target }}.${{ matrix.archive_format }}.sha256
          if-no-files-found: error

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release with all assets
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
        with:
          allowUpdates: true
          artifacts: artifacts/*/*.tar.gz,artifacts/*/*.zip,artifacts/*/*.sha256
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
          prerelease: ${{ contains(github.ref, '-') }}
