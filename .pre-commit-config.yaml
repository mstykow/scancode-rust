repos:
  - repo: local
    hooks:
      - id: fmt
        name: Format Rust code and stage changes
        entry: bash -c 'cargo fmt -- "$@" && git add -- "$@"' --
        language: system
        types: [rust]

      - id: clippy
        name: Run clippy
        entry: cargo clippy
        args: ["--lib", "--bins", "--all-features", "--", "-D", "warnings"]
        language: system
        types: [rust]
        pass_filenames: false

      - id: generate-supported-formats
        name: Generate docs/SUPPORTED_FORMATS.md
        entry: bash -c 'cargo run --quiet --locked --manifest-path xtask/Cargo.toml --bin generate-supported-formats && git add docs/SUPPORTED_FORMATS.md'
        language: system
        pass_filenames: false
        files: ^src/parsers/.*\.rs$
        exclude: ^src/parsers/.*(?:_test|_golden_test)\.rs$

      - id: markdown-lint
        name: Lint markdown files with auto-fix
        entry: bash -c 'npm exec -- markdownlint-cli2 --fix --no-globs "$@" && git add -- "$@"' --
        language: system
        types: [markdown]
        require_serial: true

      - id: prettier
        name: Format YAML, JSON, and Markdown with Prettier
        entry: bash -c 'npm exec -- prettier --write "$@" && git add -- "$@"' --
        language: system
        files: \.(yml|yaml|json|md)$
        require_serial: true
