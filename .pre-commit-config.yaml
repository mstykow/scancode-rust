repos:
  - repo: local
    hooks:
      - id: fmt
        name: Check Rust formatting
        entry: cargo fmt
        language: system
        args: ["--all", "--", "--check"]
        types: [rust]
        pass_filenames: false

      - id: clippy
        name: Run clippy
        entry: cargo clippy
        args: ["--lib", "--bins", "--all-features", "--", "-D", "warnings"]
        language: system
        types: [rust]
        pass_filenames: false

      - id: check-xtask-lockfile-sync
        name: Check xtask lockfile sync
        entry: ./scripts/check_xtask_lockfile_sync.sh
        language: system
        pass_filenames: false
        files: ^(Cargo.toml|xtask/Cargo\.toml|release\.sh)$

      - id: generate-supported-formats
        name: Generate docs/SUPPORTED_FORMATS.md
        entry: cargo run --quiet --locked --manifest-path xtask/Cargo.toml --bin generate-supported-formats
        language: system
        pass_filenames: false
        files: ^src/parsers/.*\.rs$
        exclude: ^src/parsers/.*(?:_test|_golden_test)\.rs$

      - id: markdown-lint
        name: Lint markdown files with auto-fix
        entry: bash -c 'npm exec -- markdownlint-cli2 --fix --no-globs "$@"' --
        language: system
        types: [markdown]
        require_serial: true

      - id: prettier
        name: Format YAML, JSON, and Markdown with Prettier
        entry: bash -c 'npm exec -- prettier --write "$@"' --
        language: system
        files: \.(yml|yaml|json|md)$
        require_serial: true
